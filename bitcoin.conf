# --- Mining & Optimization ---
dbcache=4096          # Set to 50% of your RAM
maxmempool=500        # Keeps more txs in RAM for ckpool
server=1              # Enables the RPC server for ckpool
rpcuser=youruser
rpcpassword=yourpass

# --- Network & Connectivity ---
port=8333             # Standard Bitcoin P2P port
maxconnections=100    # Increases peer count for faster block news
listen=1              # Allows inbound connections
externalip=your.public.ip:8333


