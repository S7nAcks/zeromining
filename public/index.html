<!DOCTYPE html>
<html>
<head>
    <title>Zero Mining Dashboard</title>
<style>
    body {
        font-family: Arial;
        background: #111;
        color: #eee;
        margin: 16px;
    }

    h1, h2, h3 { color: #00ffcc; }

    .box {
        padding: 10px;
        border: 1px solid #333;
        margin-bottom: 16px;
        background: #1a1a1a;
        border-radius: 6px;
        overflow-x: auto; /* enables horizontal scroll if needed */
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 8px;
        min-width: 600px; /* prevents crushing on small screens */
    }

    th, td {
        border: 1px solid #333;
        padding: 6px 8px;
        text-align: left;
        font-size: 13px;
        white-space: nowrap; /* prevents ugly wrapping */
    }

    th {
        background: #222;
        color: #00ffcc;
    }

    a {
        color: #00ffcc;
        text-decoration: none;
    }

    /* Better scaling on large screens */
    @media (min-width: 1400px) {
        body {
            max-width: 1400px;
            margin: 16px auto;
        }
    }

    /* Improve readability on small screens */
    @media (max-width: 768px) {
        th, td {
            font-size: 12px;
            padding: 5px;
        }

        h1 { font-size: 20px; }
        h2 { font-size: 18px; }
        h3 { font-size: 16px; }
    }
</style>

</head>

<body>

<h1>Zero Mining Dashboard (LIVE)</h1>

<div id="pool" class="box"></div>
<div id="users"></div>
<div id="blocks" class="box"></div>

<script>
    let CONFIG = {};
</script>

<script>

async function loadConfig() {
    CONFIG = await fetch("/config.json").then(r => r.json());
}

function formatRuntime(seconds) {
    if (!seconds) return "-";

    const min = Math.floor(seconds / 60);
    const h = Math.floor(min / 60);
    const d = Math.floor(h / 24);
    const y = Math.floor(d / 365);

    const out = [];
    if (y) out.push(y + "y");
    if (d % 365) out.push((d % 365) + "d");
    if (h % 24) out.push((h % 24) + "h");
    out.push((min % 60) + "m");

    return out.join(" ");
}

function formatNumber(v) {
    v = Number(v);
    if (!v || isNaN(v)) return "0";

    const units = ["", "K", "M", "G", "T", "P", "E"];
    let i = 0;

    while (v >= 1000 && i < units.length - 1) {
        v /= 1000;
        i++;
    }

    return v.toFixed(2) + units[i];
}

async function load() {

    if (!CONFIG.EXPLORER) {
        await loadConfig();
    }

    const pool = await fetch("/api/pool").then(r => r.json());

    const difficulty =
        pool.summary.difficulty ||
        pool.summary.networkdifficulty ||
        pool.summary.network_difficulty ||
        pool.summary.diff ||
        0;

    document.getElementById("pool").innerHTML = `
        <h2>Pool Stats</h2>

        <table>
        <tr>
            <th>Uptime</th>
            <th>Users</th>
            <th>Workers</th>
            <th>Idle</th>
            <th>Disconnected</th>
        </tr>
        <tr>
            <td>${formatRuntime(pool.summary.runtime)}</td>
            <td>${pool.summary.Users}</td>
            <td>${pool.summary.Workers}</td>
            <td>${pool.summary.Idle}</td>
            <td>${pool.summary.Disconnected}</td>
        </tr>
        </table>

        <table>
        <tr>
            <th>Hashrate</th>
            <th>5m</th>
            <th>15m</th>
            <th>1h</th>
            <th>1d</th>
        </tr>
        <tr>
            <td>${pool.hashrate.hashrate1m}</td>
            <td>${pool.hashrate.hashrate5m}</td>
            <td>${pool.hashrate.hashrate15m}</td>
            <td>${pool.hashrate.hashrate1hr}</td>
            <td>${pool.hashrate.hashrate1d}</td>
        </tr>
        </table>

        <table>
        <tr>
            <th>Blocks Found</th>
            <th>Network Difficulty</th>
        </tr>
        <tr>
            <td>${pool.blocksFound}</td>
            <td>${formatNumber(difficulty)}</td>
        </tr>
        </table>
    `;

    const users = await fetch("/api/users").then(r => r.json());

    let html = "<h2>Users</h2>";

    const now = Math.floor(Date.now() / 1000);
    const ONE_DAY = 86400;

    for (let u of users) {
        const d = await fetch("/api/user/" + u).then(r => r.json());
        if (!d) continue;

        const activeWorkers = d.worker.filter(w => (now - w.lastshare) <= ONE_DAY);
        if (activeWorkers.length === 0) continue;

        html += `
        <div class="box">
            <h3>${u}</h3>

            <table>
            <tr>
                <th>Workers</th>
                <th>Hashrate</th>
                <th>Blocks Found</th>
                <th>Shares</th>
            </tr>
            <tr>
                <td>${activeWorkers.length}</td>
                <td>${d.hashrate1m}</td>
                <td>${d.blocksFound}</td>
                <td>${d.shares}</td>
            </tr>
            </table>

            <table>
            <tr>
                <th>Worker</th>
                <th>Hashrate</th>   <!-- ADDED -->
                <th>Blocks Found</th>
                <th>Shares</th>
                <th>Best Share</th>
                <th>Best Share Ever</th>
                <th>Last Share</th>
            </tr>
        `;

        for (let w of activeWorkers) {
            const name = w.workername.split(".").pop();

            html += `
            <tr>
                <td>${name}</td>
                <td>${w.hashrate1m}</td>   <!-- ADDED VALUE -->
                <td>${w.blocksFound || 0}</td>
                <td>${w.shares}</td>
                <td>${formatNumber(w.bestshare)}</td>
                <td>${formatNumber(w.bestever)}</td>
                <td>${new Date(w.lastshare * 1000).toLocaleString()}</td>
            </tr>`;
        }

        html += "</table></div>";
    }

    document.getElementById("users").innerHTML = html;

    // BLOCKS (only change: add sdiff column)
    const blocks = pool.blocks || [];

    let bhtml = "<h2>Blocks Found</h2>";

    bhtml += `
    <table>
    <tr>
        <th>Height</th>
        <th>Time</th>
        <th>User</th>
        <th>Worker</th>
        <th>Share</th>
        <th>Reward</th>
    </tr>`;

    for (let b of blocks) {

        const sdiff = b.sdiff || 0;

        bhtml += `
        <tr>
            <td>
                <a href="${CONFIG.EXPLORER.base}${CONFIG.EXPLORER.block}${b.height}" target="_blank">
                    ${b.height}
                </a>
            </td>
            <td>${new Date(b.time * 1000).toLocaleString()}</td>
            <td>${b.user}</td>
            <td>${b.worker}</td>
            <td>${formatNumber(sdiff)}</td>
            <td>${b.reward}</td>
        </tr>`;
    }

    bhtml += "</table>";

    document.getElementById("blocks").innerHTML = bhtml;

}

setInterval(load, 10000);
load();

</script>

</body>
</html>
